services:
  mongo_db:
    container_name: chatApp
    image: mongo:7.0.5

    ports:
      - "27017:27017"

    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
      MONGO_INITDB_DATABASE: chatAppDB

    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
